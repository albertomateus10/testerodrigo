<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Principal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Paleta de Cores */
            --cor-primaria-escura: #0A2E50;
            --cor-primaria: #1C4F8A;
            --cor-secundaria: #5C88B1;
            --cor-destaque: #A8D1E6;
            --cor-fundo: #FFFFFF;
            --cor-texto: #333333;
            --cor-fundo-pagina: #f4f7f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--cor-fundo-pagina);
            color: var(--cor-texto);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header / Navbar */
        header {
            background-color: var(--cor-primaria-escura);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 15px rgba(10, 46, 80, 0.2);
        }

        header h1 {
            color: var(--cor-fundo);
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 svg {
            width: 28px;
            height: 28px;
            color: var(--cor-destaque);
        }

        /* Área de Conteúdo */
        main {
            flex: 1;
            padding: 60px 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .titulo-secao {
            text-align: center;
            margin-bottom: 60px;
        }

        .titulo-secao h2 {
            font-size: 36px;
            font-weight: 700;
            color: var(--cor-primaria-escura);
            margin-bottom: 15px;
        }

        .titulo-secao p {
            font-size: 18px;
            color: var(--cor-secundaria);
            max-width: 600px;
            line-height: 1.6;
            margin: 0 auto;
        }

        /* Grid de Botões (Cards) */
        .grid-botoes {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 900px;
        }

        /* Botão / Card */
        .btn-card {
            background: var(--cor-fundo);
            border-radius: 16px;
            padding: 40px 30px;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 10px 25px rgba(10, 46, 80, 0.05);
            border: 1px solid rgba(168, 209, 230, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .btn-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(90deg, var(--cor-primaria), var(--cor-destaque));
            transform: scaleX(0);
            transition: transform 0.4s ease;
            transform-origin: left;
        }

        .btn-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(10, 46, 80, 0.12);
            border-color: var(--cor-destaque);
        }

        .btn-card:hover::before {
            transform: scaleX(1);
        }

        .icone-wrapper {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--cor-primaria-escura), var(--cor-primaria));
            color: var(--cor-fundo);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(28, 79, 138, 0.25);
            transition: transform 0.4s ease;
        }

        .btn-card:hover .icone-wrapper {
            transform: scale(1.1) rotate(5deg);
        }

        .icone-wrapper svg {
            width: 36px;
            height: 36px;
            stroke-width: 1.5;
        }

        .btn-titulo {
            font-size: 20px;
            font-weight: 700;
            color: var(--cor-primaria-escura);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-desc {
            font-size: 14px;
            color: var(--cor-secundaria);
            line-height: 1.5;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            header {
                padding: 16px 20px;
                justify-content: center;
            }

            main {
                padding: 40px 20px;
            }

            .titulo-secao h2 {
                font-size: 28px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
            </svg>
            Painel Principal
        </h1>
    </header>

    <main>
        <div class="titulo-secao">
            <h2>Gestão de Documentos</h2>
            <p>Selecione um dos documentos abaixo para acessar sua versão digital e interativa.</p>
        </div>

        <div class="grid-botoes">
            <!-- Botão CONTRATO -->
            <a href="https://albertomateus10.github.io/testecontratorodrigoteste/" class="btn-card">
                <div class="icone-wrapper">
                    <!-- Ícone de Documento/Contrato -->
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h3 class="btn-titulo">CONTRATO</h3>
                <p class="btn-desc">Acessar e preencher o Contrato de Trabalho a Título de Experiência.</p>
            </a>

            <!-- Espaço reservado para futuros botões -->
        </div>
    </main>

</body>

</html>
